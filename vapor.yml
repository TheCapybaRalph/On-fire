id: 75200
name: onfiremonitoring
environments:
  production:
    storage: staging-bucket-hahaha
    memory: 1024
    cli-memory: 512
    database: pg-prod-db
    cache: "Cachero"
    runtime: docker
    docker-build-options:
      - provenance=false
    build:
      - 'composer install --no-dev'
      - 'php artisan event:cache'
      - 'php artisan test'
      - 'npm i && npm run build'
    deploy:
      - 'php artisan migrate --force'
