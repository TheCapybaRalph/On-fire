id: 75225
name: jett-revive-me
environments:
  production:
    memory: 1024
    cli-memory: 512
    database: pgqq
    cache: cachi
    runtime: docker
    docker-build-options:
      - provenance=false
    build:
      - 'herd composer install --no-dev'
      - 'herd php artisan event:cache'
      - 'npm i && npm run build'
    deploy:
      - 'php artisan migrate --force'
